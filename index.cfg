<?xml version="1.0" encoding="UTF-8"?>
<configuration kit="RandomFalloff" version="1.0">
  <atom type="Extensions64">
    <list type="AutoScan">extra</list>
  </atom>
  <atom type="Attributes">
    <hash type="Sheet" key="RandomFalloff_Help:sheet">
      <atom type="Label">Random Falloff</atom>
      <atom type="Group">Random Falloff</atom>
      <atom type="Style">inline</atom>
      <hash type="InCategory" key="ExtensionHelp:sheet#tail">
        <atom type="Ordinal">30</atom>
      </hash>
      <list type="Control" val="cmd file.open {kit_RandomFalloff:README.html}">
        <atom type="Label">Random Falloff Help</atom>
        <atom type="StartCollapsed">0</atom>
        <atom type="Hash">RandomFalloff_Help:control</atom>
      </list>
    </hash>
  </atom>
  <atom type="Filters">
    <hash type="Preset" key="RandomFalloff:filterPreset">
      <atom type="Name">Random Falloff</atom>
      <atom type="Category">95043940005:filterCat</atom>
      <list type="Node">1 .group 0 ""</list>
      <list type="Node">1 toolType tool.randomFalloff</list>
      <list type="Node">-1 .endgroup </list>
    </hash>
  </atom>
  <atom type="Attributes">
    <hash type="Sheet" key="RandomFalloff:sheet">
      <atom type="Label">Random Falloff</atom>
      <atom type="ShowLabel">1</atom>
      <atom type="Layout">properties</atom>
      <atom type="Columns">1</atom>
      <atom type="IconMode">text</atom>
      <atom type="IconSize">small</atom>
      <atom type="FilterCommand">tool.isActive tool.randomFalloff</atom>
      <hash type="InCategory" key="toolprops:general#head">
        <atom type="Ordinal">100.70</atom>
      </hash>
      <list type="Control" val="cmd tool.attr tool.randomFalloff source ?">
		    <atom type="ShowWhenDisabled">0</atom>
      </list>
      <list type="Control" val="cmd tool.attr tool.randomFalloff seed ?">
		    <atom type="ShowWhenDisabled">0</atom>
      </list>
      <list type="Control" val="cmd tool.attr tool.randomFalloff bipolar ?">
		    <atom type="ShowWhenDisabled">0</atom>
      </list>
    </hash>
    <hash type="Sheet" key="RandomFalloffToolbar:sheet">
      <atom type="Label">Random Falloff</atom>
      <atom type="Style">inline</atom>
      <hash type="InCategory" key="frm_FalloffMenu:sheet#head">
        <atom type="Ordinal">49.50.65</atom>
      </hash>
      <list type="Control" val="cmd tool.set tool.randomFalloff on">
        <atom type="Label">Random</atom>
      </list>
    </hash>
    <hash type="Sheet" key="tool.randomFalloff.item:sheet">
      <atom type="Label">Random Falloff</atom>
      <atom type="Filter">tool.randomFalloff.item:filterPreset</atom>
      <atom type="FilterCommand">item.withTypeIsSelected {tool.randomFalloff.item} testSupertypes:true</atom>
      <hash type="InCategory" key="itemprops:general#head">
        <atom type="Ordinal">110</atom>
      </hash>
    </hash>
  </atom>
  <atom type="CommandHelp">
    <hash type="Tool" key="tool.randomFalloff@en_US">
      <atom type="UserName">Random Falloff</atom>
      <atom type="Tooltip">Random Falloff</atom>
      <atom type="Desc">Select within selection tool.</atom>
      <hash type="Attribute" key="source">
        <atom type="UserName">Source</atom>
        <atom type="Desc">Source for random falloff.</atom>
        <atom type="ArgumentType">random_sources</atom>
      </hash>
      <hash type="Attribute" key="seed">
        <atom type="UserName">Seed</atom>
        <atom type="Desc">Random seed.</atom>
      </hash>
      <hash type="Attribute" key="bipolar">
        <atom type="UserName">Bipoloar</atom>
        <atom type="Desc">Range of falloff weight.</atom>
      </hash>
    </hash>
    <hash type="ArgumentType" key="random_sources@en_US">
      <hash type="Option" key="element">
        <atom type="UserName">Element</atom>
        <atom type="Desc">Set random values per mesh element.</atom>
      </hash>
      <hash type="Option" key="island">
        <atom type="UserName">Selection Island</atom>
        <atom type="Desc">Set random value per selection island.</atom>
      </hash>
      <hash type="Option" key="partTag">
        <atom type="UserName">Part Tag</atom>
        <atom type="Desc">Set random value per part polygon tag.</atom>
      </hash>
    </hash>
  </atom>
  <atom type="Messages">
    <hash type="Table" key="tool.randomFalloff.en_US">
      <hash type="T" key="NoVertex">This tool is no mesh element on active meshes.</hash>
    </hash>
    <hash type="Table" key="falloff.state.en_US">
      <hash type="T" key="tool.randomFalloff">Random</hash>
    </hash>
  </atom>
</configuration>
